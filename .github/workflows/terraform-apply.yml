name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Terraform environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
      cloud:
        description: "Cloud provider label for plan/apply artifacts"
        required: true
        default: "azure"
        type: choice
        options:
          - azure

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_IN_AUTOMATION: true
      TF_ENV: ${{ github.event.inputs.environment }}
      TF_CLOUD: ${{ github.event.inputs.cloud }}
      TF_AUTO_APPROVE: true
      ARM_USE_OIDC: true
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_wrapper: false

      - name: Make scripts executable
        run: |
          chmod +x \
            terraform/scripts/*.sh \
            terraform/tests/run-all.sh \
            terraform/tests/validation/validate.sh \
            terraform/tests/lint/run-tflint.sh \
            terraform/tests/security/run-checkov.sh

      - name: Run validation before apply
        run: terraform/tests/validation/validate.sh "$TF_ENV"

      - name: Apply Terraform
        run: terraform/scripts/terraform-apply.sh "$TF_ENV" "$TF_CLOUD"
