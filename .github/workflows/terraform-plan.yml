name: Terraform Plan

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform-plan.yml

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_IN_AUTOMATION: true
      TF_ENV: dev
      TF_CLOUD: azure
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install --disable-pip-version-check checkov

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4

      - name: Make scripts executable
        run: chmod +x terraform/scripts/*.sh terraform/tests/run-all.sh terraform/tests/validation/validate.sh terraform/tests/lint/run-tflint.sh terraform/tests/security/run-checkov.sh

      - name: Run quality gates
        run: terraform/tests/run-all.sh "$TF_ENV"

      - name: Generate Terraform plan
        run: terraform/scripts/terraform-plan.sh "$TF_ENV" "$TF_CLOUD"

      - name: Upload plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-plan-${{ env.TF_CLOUD }}-${{ env.TF_ENV }}
          path: terraform/.plans/${{ env.TF_CLOUD }}-${{ env.TF_ENV }}.tfplan
